name: Linux build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MTEngineSDLDummyApp
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            pkg-config \
            libsdl2-dev \
            libglew-dev \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxcb1-dev \
            libsndio-dev \
            libfreetype-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            zlib1g-dev

      - name: Build
        run: |
          chmod +x ./build-linux.sh
          ./build-linux.sh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: MTEngineSDLDummyApp-linux
          path: build/MTEngineSDLDummyApp
          if-no-files-found: error
